<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="'Inter','Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <radialGradient id="bg" cx="34%" cy="16%" r="120%">
      <stop offset="0%" stop-color="#0E1B1E"/><stop offset="55%" stop-color="#0A1416"/><stop offset="100%" stop-color="#06090A"/>
    </radialGradient>
    <radialGradient id="hub" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#11332F"/><stop offset="100%" stop-color="#0A1E1D"/>
    </radialGradient>
    <linearGradient id="titleAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4FD0C5"/><stop offset="50%" stop-color="#E8B23A"/><stop offset="100%" stop-color="#FF5C49"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4FD0C5"/><stop offset="50%" stop-color="#7FC9A0"/><stop offset="100%" stop-color="#E8B23A"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1a2a2e" stroke-width="1" opacity="0.32"/>
    </pattern>
    <marker id="aRing" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#79C6BD"/>
    </marker>
    <marker id="aTeal" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#4FD0C5"/>
    </marker>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>

  <!-- ===== Title + credit ===== -->
  <text x="64" y="62" fill="#F2F7F5" font-size="32" font-weight="800" letter-spacing="-0.5">The Self-Improvement Loop</text>
  <text x="64" y="92" fill="#8FB6AE" font-size="16" font-weight="500">The brain learns its own operating rules from its own low-scoring answers — proposed first, applied explicitly.</text>
  <rect x="64" y="106" width="380" height="4" rx="2" fill="url(#titleAccent)"/>
  <g transform="translate(64,124)">
    <rect x="0" y="0" width="270" height="30" rx="15" fill="#16100A" stroke="#E8B23A" stroke-width="1.3"/>
    <text x="18" y="20" fill="#E8B23A" font-size="13" font-weight="700">★ Concept by Maria Beiner</text>
  </g>

  <!-- ===== Cycle ===== -->
  <!-- guide ring -->
  <circle cx="560" cy="540" r="290" fill="none" stroke="#1f3d3a" stroke-width="1.4" stroke-dasharray="3 8"/>

  <!-- ring arrows (clockwise: Remember -> Run -> Score -> Propose -> Apply -> Remember) -->
  <g fill="none" stroke="#79C6BD" stroke-width="2.8">
    <path d="M620.3 256.4 A290 290 0 0 1 811.1 395"   marker-end="url(#aRing)"/>
    <path d="M848.4 509.6 A290 290 0 0 1 775.5 734"   marker-end="url(#aRing)"/>
    <path d="M678 805 A290 290 0 0 1 442 805"         marker-end="url(#aRing)"/>
    <path d="M344.5 734 A290 290 0 0 1 271.6 509.6"   marker-end="url(#aRing)"/>
    <path d="M308.9 395 A290 290 0 0 1 499.7 256.4"   marker-end="url(#aRing)"/>
  </g>

  <!-- outer arc captions -->
  <g font-size="11.5" fill="#7d9b96" text-anchor="middle">
    <text x="775" y="262">load as system_prompt</text>
    <text x="892" y="648">writes to session memory</text>
    <text x="560" y="876">on rubric failure → adopt the fix</text>
    <text x="232" y="648">archive the previous skill</text>
    <text x="352" y="258">improved skill</text>
    <text x="352" y="273">becomes active</text>
  </g>

  <!-- distill branch: Score -> permanent graph (center) -->
  <path d="M700 742 C660 690 630 650 606 604" fill="none" stroke="#4FD0C5" stroke-width="2.4" stroke-dasharray="7 6" marker-end="url(#aTeal)"/>
  <g transform="translate(612,648) rotate(-36)">
    <text x="0" y="0" fill="#8fd9d1" font-size="11.5" font-weight="600">cognee.improve(session_ids)</text>
  </g>

  <!-- center hub -->
  <circle cx="560" cy="540" r="80" fill="url(#hub)" stroke="#4FD0C5" stroke-width="2" filter="url(#glow)"/>
  <text x="560" y="524" text-anchor="middle" fill="#9af0e6" font-size="15" font-weight="800">Permanent</text>
  <text x="560" y="544" text-anchor="middle" fill="#9af0e6" font-size="15" font-weight="800">graph</text>
  <text x="560" y="566" text-anchor="middle" fill="#6aa39d" font-size="11">enriched · durable</text>

  <!-- ===== Step cards (drawn over arcs) ===== -->
  <!-- 1 Remember (top, gold) -->
  <g filter="url(#shadow)"><rect x="460" y="204" width="200" height="92" rx="14" fill="#16100A" stroke="#E8B23A" stroke-width="1.5"/></g>
  <rect x="460" y="204" width="200" height="5" rx="2.5" fill="#E8B23A"/>
  <circle cx="484" cy="232" r="14" fill="#E8B23A"/><text x="484" y="237" text-anchor="middle" fill="#16100A" font-size="14" font-weight="800">1</text>
  <text x="506" y="235" fill="#F0E5CB" font-size="15.5" font-weight="700">Remember skill</text>
  <text x="478" y="258" fill="#cdbd97" font-size="11.5">load the active skill as the</text>
  <text x="478" y="276" fill="#cdbd97" font-size="11.5">recall system_prompt</text>

  <!-- 2 Run (right-upper, teal) -->
  <g filter="url(#shadow)"><rect x="735.8" y="404.4" width="200" height="92" rx="14" fill="#091819" stroke="#4FD0C5" stroke-width="1.5"/></g>
  <rect x="735.8" y="404.4" width="200" height="5" rx="2.5" fill="#4FD0C5"/>
  <circle cx="759.8" cy="432.4" r="14" fill="#4FD0C5"/><text x="759.8" y="437.4" text-anchor="middle" fill="#091819" font-size="14" font-weight="800">2</text>
  <text x="781.8" y="435.4" fill="#DCE7E4" font-size="15.5" font-weight="700">Run</text>
  <text x="753.8" y="458.4" fill="#79c2bb" font-size="11.5">recall(GRAPH_COMPLETION)</text>
  <text x="753.8" y="476.4" fill="#79c2bb" font-size="11.5">over typed edges → session</text>

  <!-- 3 Score (right-lower, coral) -->
  <g filter="url(#shadow)"><rect x="630.5" y="728.6" width="200" height="92" rx="14" fill="#190D0B" stroke="#FF5C49" stroke-width="1.5"/></g>
  <rect x="630.5" y="728.6" width="200" height="5" rx="2.5" fill="#FF5C49"/>
  <circle cx="654.5" cy="756.6" r="14" fill="#FF5C49"/><text x="654.5" y="761.6" text-anchor="middle" fill="#190D0B" font-size="14" font-weight="800">3</text>
  <text x="676.5" y="759.6" fill="#F4DAD5" font-size="15.5" font-weight="700">Score</text>
  <text x="648.5" y="782.6" fill="#d79a92" font-size="11.5">cited? · conflict? · currency?</text>
  <text x="648.5" y="800.6" fill="#d79a92" font-size="11.5">deterministic rubric, 0–10</text>

  <!-- 4 Propose (left-lower, gold) -->
  <g filter="url(#shadow)"><rect x="289.5" y="728.6" width="200" height="92" rx="14" fill="#16100A" stroke="#E8B23A" stroke-width="1.5"/></g>
  <rect x="289.5" y="728.6" width="200" height="5" rx="2.5" fill="#E8B23A"/>
  <circle cx="313.5" cy="756.6" r="14" fill="#E8B23A"/><text x="313.5" y="761.6" text-anchor="middle" fill="#16100A" font-size="14" font-weight="800">4</text>
  <text x="335.5" y="759.6" fill="#F0E5CB" font-size="15.5" font-weight="700">Propose rewrite</text>
  <text x="307.5" y="782.6" fill="#cdbd97" font-size="11.5">adopt the CLAUDE.md policy</text>
  <text x="307.5" y="800.6" fill="#cdbd97" font-size="11.5">that fixes it — NOT applied</text>

  <!-- 5 Apply (left-upper, green) -->
  <g filter="url(#shadow)"><rect x="184.2" y="404.4" width="200" height="92" rx="14" fill="#091813" stroke="#5BD18A" stroke-width="1.5"/></g>
  <rect x="184.2" y="404.4" width="200" height="5" rx="2.5" fill="#5BD18A"/>
  <circle cx="208.2" cy="432.4" r="14" fill="#5BD18A"/><text x="208.2" y="437.4" text-anchor="middle" fill="#091813" font-size="14" font-weight="800">5</text>
  <text x="230.2" y="435.4" fill="#D7F0E0" font-size="15.5" font-weight="700">Apply (explicit)</text>
  <text x="202.2" y="458.4" fill="#9fcdb4" font-size="11.5">--apply swaps the skill,</text>
  <text x="202.2" y="476.4" fill="#9fcdb4" font-size="11.5">archives the previous one</text>

  <!-- ===== Right panel: native API mapping ===== -->
  <g filter="url(#shadow)"><rect x="1000" y="196" width="540" height="392" rx="16" fill="#0b1518" stroke="#28464a" stroke-width="1.4"/></g>
  <rect x="1000" y="196" width="540" height="5" rx="2.5" fill="url(#ring)"/>
  <text x="1026" y="238" fill="#DCE7E4" font-size="18" font-weight="700">Maps 1:1 onto Cognee's native skill API</text>
  <line x1="1026" y1="252" x2="1514" y2="252" stroke="#1f3338"/>
  <text x="1026" y="280" fill="#6f8a86" font-size="12" font-weight="700">COGNOST (brain/)</text>
  <text x="1290" y="280" fill="#6f8a86" font-size="12" font-weight="700">NATIVE COGNEE 1.2</text>
  <g font-size="12.5">
    <text x="1026" y="312" fill="#cfe0dc">score_answer() → 0–10</text>
    <text x="1276" y="312" fill="#9af0e6">→</text>
    <text x="1300" y="312" fill="#bcd9d4">SkillRunEntry.success_score</text>

    <text x="1026" y="346" fill="#cfe0dc">selfimprove.propose()</text>
    <text x="1276" y="346" fill="#9af0e6">→</text>
    <text x="1300" y="346" fill="#bcd9d4">improve_skill(apply=False)</text>
    <text x="1300" y="364" fill="#7d9b96" font-size="11">→ SkillImprovementProposal</text>

    <text x="1026" y="398" fill="#cfe0dc">selfimprove.apply()</text>
    <text x="1276" y="398" fill="#9af0e6">→</text>
    <text x="1300" y="398" fill="#bcd9d4">improve_skill(apply=True)</text>

    <text x="1026" y="432" fill="#cfe0dc">distill()</text>
    <text x="1276" y="432" fill="#9af0e6">→</text>
    <text x="1300" y="432" fill="#bcd9d4">cognee.improve(session_ids)</text>
  </g>
  <line x1="1026" y1="456" x2="1514" y2="456" stroke="#1f3338"/>
  <rect x="1026" y="472" width="488" height="44" rx="10" fill="#16100a" stroke="#7a6228"/>
  <text x="1044" y="490" fill="#E8B23A" font-size="12.5" font-weight="700">Proposal-first — never auto-applied.</text>
  <text x="1044" y="508" fill="#cdbd97" font-size="11.5">Honours CLAUDE.md §3: never silently resolve a contradiction.</text>
  <rect x="1026" y="524" width="488" height="44" rx="10" fill="#0b1c1d" stroke="#2f6b65"/>
  <text x="1044" y="542" fill="#8fd9d1" font-size="12.5" font-weight="700">Measured effect (same questions, only the skill changes):</text>
  <text x="1044" y="560" fill="#79c2bb" font-size="12">baseline 1.3 / 10  →  learned maintainer 10.0 / 10</text>

  <text x="1536" y="972" text-anchor="end" fill="#3f5b57" font-size="12">Cognost · self-improvement loop · github.com/kaiser-data/cognost</text>
</svg>
