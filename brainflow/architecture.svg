    <line x1="800" y1="452" x2="905" y2="478" stroke="#6f8a86"/>
    <line x1="905" y1="478" x2="958" y2="540" stroke="#E8B23A"/>
    <line x1="690" y1="470" x2="700" y2="560" stroke="#6f8a86"/>
    <line x1="700" y1="560" x2="800" y2="452" stroke="#FF5C49"/>
    <line x1="800" y1="452" x2="820" y2="572" stroke="#6f8a86"/>
