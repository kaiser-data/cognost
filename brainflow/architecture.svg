    <rect x="1364" y="544" width="170" height="40" rx="8" fill="#0c1c15" stroke="#2f6b48"/>
    <text x="1378" y="569">Contradiction register</text>
    <rect x="1364" y="592" width="170" height="40" rx="8" fill="#0c1c15" stroke="#2f6b48"/>
    <text x="1378" y="617">Diagnostic · 0 → 6</text>
    <rect x="1364" y="640" width="170" height="40" rx="8" fill="#0c1c15" stroke="#2f6b48"/>
    <text x="1378" y="665">State snapshots (JSON)</text>
  </g>

  <!-- ============================================================ -->
  <!-- SELF-IMPROVEMENT FEEDBACK LOOP (bottom)                      -->
  <!-- ============================================================ -->
  <!-- ops self-improve -> distil back into the permanent graph (bottom lane) -->
  <path d="M1160 702 L1160 900 Q1160 920 1140 920 L825 920 Q805 920 805 900 L805 794"
        fill="none" stroke="#4FD0C5" stroke-width="2.4" stroke-dasharray="7 6" marker-end="url(#aTeal)"/>
  <rect x="838" y="903" width="318" height="34" rx="8" fill="#0b1c1d" stroke="#2f6b65"/>
  <text x="997" y="925" text-anchor="middle" fill="#8fd9d1" font-size="13" font-weight="600">cognee.improve(session_ids) — distil session → graph</text>

  <!-- ops self-improve -> learned policies -> governance (clears Outputs on the right) -->
  <path d="M1210 702 L1210 728 Q1210 740 1230 740 L1556 740 Q1576 740 1576 720 L1576 270 Q1576 250 1556 250 L1216 250"
        fill="none" stroke="#E8B23A" stroke-width="2.2" stroke-dasharray="7 6" marker-end="url(#aGold)"/>
  <rect x="1364" y="300" width="196" height="50" rx="8" fill="#0d0a05" stroke="#7a6228"/>
  <text x="1462" y="321" text-anchor="middle" fill="#E8B23A" font-size="12.5" font-weight="700">learned policies</text>
  <text x="1462" y="338" text-anchor="middle" fill="#cdbd97" font-size="11">→ rewrite the skill</text>

  <!-- ============================================================ -->
  <!-- LEGEND                                                       -->
