  <circle cx="1092" cy="436" r="15" fill="#FF5C49"/><text x="1092" y="441" text-anchor="middle" fill="#190D0B" font-size="15" font-weight="800">5</text>
  <text x="1118" y="441" fill="#F4DAD5" font-size="18" font-weight="700">Operations</text>
  <g>
    <rect x="1080" y="466" width="206" height="70" rx="10" fill="#1a0d0b" stroke="#7a322a"/>
    <text x="1096" y="490" fill="#ff9488" font-size="14" font-weight="700">Query / Recall</text>
    <text x="1096" y="509" fill="#d79a92" font-size="11.5">GRAPH_COMPLETION</text>
    <text x="1096" y="526" fill="#d79a92" font-size="11.5">cited, conflict-aware answers</text>
    <rect x="1080" y="544" width="206" height="70" rx="10" fill="#1a0d0b" stroke="#7a322a"/>
    <text x="1096" y="568" fill="#ff9488" font-size="14" font-weight="700">Lint</text>
    <text x="1096" y="587" fill="#d79a92" font-size="11.5">contradictions · supersessions</text>
    <text x="1096" y="604" fill="#d79a92" font-size="11.5">orphans · metric drift</text>
    <rect x="1080" y="622" width="206" height="80" rx="10" fill="#1a0d0b" stroke="#FF5C49"/>
    <text x="1096" y="646" fill="#ff9488" font-size="14" font-weight="700">Self-improve</text>
    <text x="1096" y="665" fill="#d79a92" font-size="11.5">score → diagnose</text>
    <text x="1096" y="682" fill="#d79a92" font-size="11.5">propose → apply (explicit)</text>
  </g>

  <!-- governance -> query (skill as system prompt) -->
  <path d="M1183 300 C1183 350 1183 360 1183 462" fill="none" stroke="#E8B23A" stroke-width="2" stroke-dasharray="2 6" marker-end="url(#aGold)"/>
  <text x="1196" y="356" fill="#E8B23A" font-size="11.5" font-weight="600">skill = system_prompt</text>

  <!-- arrow 5->6 -->
  <line x1="1306" y1="540" x2="1344" y2="540" stroke="#FF5C49" stroke-width="2.4" marker-end="url(#aCoral)"/>

