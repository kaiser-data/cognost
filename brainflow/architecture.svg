    <g><circle cx="800" cy="452" r="7" fill="#4FD0C5"/><text x="800" y="438">Roadmap</text></g>
    <g><circle cx="905" cy="478" r="7" fill="#4FD0C5"/><text x="930" y="472">Decision Log</text></g>
    <g><circle cx="958" cy="540" r="7" fill="#4FD0C5"/><text x="958" y="528">ADR-0005</text></g>
    <g><circle cx="700" cy="560" r="7" fill="#4FD0C5"/><text x="688" y="582">Sales</text></g>
    <g><circle cx="820" cy="572" r="7" fill="#4FD0C5"/><text x="820" y="592">Design</text></g>
  </g>
  <!-- edge labels -->
  <text x="742" y="448" fill="#FF8A7C" font-size="10.5" font-weight="700" text-anchor="middle">contradicts</text>
  <text x="945" y="512" fill="#F0C868" font-size="10.5" font-weight="700" text-anchor="middle">supersedes</text>
  <text x="735" y="520" fill="#FF8A7C" font-size="10.5" font-weight="700" text-anchor="middle" transform="rotate(-38 735 520)">contradicts</text>

