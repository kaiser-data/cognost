  <g filter="url(#shadow)">
    <rect x="338" y="430" width="214" height="260" rx="16" fill="url(#gIng)" stroke="#8B7BD8" stroke-width="1.4"/>
  </g>
  <rect x="338" y="430" width="214" height="5" rx="2.5" fill="#9D8DEA"/>
  <circle cx="370" cy="466" r="15" fill="#9D8DEA"/><text x="370" y="471" text-anchor="middle" fill="#12101F" font-size="15" font-weight="800">2</text>
  <text x="396" y="465" fill="#E4DEF7" font-size="18" font-weight="700">Ingestion</text>
  <text x="358" y="494" fill="#A99FD0" font-size="12.5">Cognee Cloud</text>
  <g>
    <rect x="358" y="510" width="174" height="60" rx="10" fill="#100e1c" stroke="#5a4f8a"/>
    <text x="372" y="533" fill="#bcb0ec" font-size="14" font-weight="700">remember()</text>
    <text x="372" y="553" fill="#9388c4" font-size="12">file upload</text>
  </g>
  <line x1="445" y1="570" x2="445" y2="592" stroke="#9D8DEA" stroke-width="2" marker-end="url(#aGold)" style="marker-end:url(#aMute)"/>
  <g>
    <rect x="358" y="600" width="174" height="72" rx="10" fill="#100e1c" stroke="#5a4f8a"/>
