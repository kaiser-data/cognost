    <text x="628" y="669" fill="#6aa39d" font-size="11.5">ephemeral · per session_id</text>
    <text x="628" y="686" fill="#6aa39d" font-size="11.5">scored Q&amp;A + feedback</text>
  </g>
  <g>
    <rect x="812" y="626" width="186" height="74" rx="11" fill="#0b1c1d" stroke="#4FD0C5"/>
    <text x="828" y="650" fill="#9af0e6" font-size="13.5" font-weight="700">Permanent graph</text>
    <text x="828" y="669" fill="#79c2bb" font-size="11.5">durable · typed edges</text>
    <text x="828" y="686" fill="#79c2bb" font-size="11.5">register + summaries + wiki</text>
  </g>
  <text x="640" y="730" fill="#5f807b" font-size="11.5">typed edges:</text>
  <text x="722" y="730" fill="#FF8A7C" font-size="11.5" font-weight="700">contradicts</text>
  <text x="800" y="730" fill="#F0C868" font-size="11.5" font-weight="700">· supersedes</text>
  <text x="893" y="730" fill="#8fd9d1" font-size="11.5" font-weight="700">· owned_by · cites</text>

