<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1040" font-family="'Inter','Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <radialGradient id="bg" cx="38%" cy="20%" r="120%">
      <stop offset="0%" stop-color="#0E1B1E"/>
      <stop offset="55%" stop-color="#0A1416"/>
      <stop offset="100%" stop-color="#06090A"/>
    </radialGradient>
    <linearGradient id="gSrc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B2A31"/><stop offset="100%" stop-color="#11191D"/>
    </linearGradient>
    <linearGradient id="gIng" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1B33"/><stop offset="100%" stop-color="#12101F"/>
    </linearGradient>
    <linearGradient id="gBrain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E2A2A"/><stop offset="100%" stop-color="#091819"/>
    </linearGradient>
    <linearGradient id="gGov" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#241B0C"/><stop offset="100%" stop-color="#16100A"/>
    </linearGradient>
    <linearGradient id="gOps" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A130F"/><stop offset="100%" stop-color="#190D0B"/>
    </linearGradient>
    <linearGradient id="gOut" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E2620"/><stop offset="100%" stop-color="#091813"/>
    </linearGradient>
    <linearGradient id="titleAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4FD0C5"/><stop offset="50%" stop-color="#E8B23A"/><stop offset="100%" stop-color="#FF5C49"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1a2a2e" stroke-width="1" opacity="0.35"/>
    </pattern>
    <marker id="aTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#4FD0C5"/>
    </marker>
    <marker id="aGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#E8B23A"/>
    </marker>
    <marker id="aCoral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#FF5C49"/>
    </marker>
    <marker id="aMute" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#6f8a86"/>
    </marker>
  </defs>

  <rect width="1600" height="1040" fill="url(#bg)"/>
  <rect width="1600" height="1040" fill="url(#grid)"/>

  <!-- ===== Title ===== -->
  <text x="64" y="62" fill="#F2F7F5" font-size="34" font-weight="800" letter-spacing="-0.5">Cognost</text>
  <text x="210" y="62" fill="#9DB4AE" font-size="22" font-weight="500">— a self-improving stakeholder-alignment Company Brain</text>
  <text x="64" y="92" fill="#6f8a86" font-size="15" font-weight="500">Two-tier memory on Cognee Cloud · ingest → query (cited, conflict-aware) → lint → self-improve</text>
  <rect x="64" y="106" width="430" height="4" rx="2" fill="url(#titleAccent)"/>

  <!-- ============================================================ -->
  <!-- GOVERNANCE BAND (top, feeds Operations)                      -->
  <!-- ============================================================ -->
  <g filter="url(#shadow)">
    <rect x="610" y="150" width="600" height="150" rx="16" fill="url(#gGov)" stroke="#E8B23A" stroke-width="1.6"/>
  </g>
  <rect x="610" y="150" width="600" height="5" rx="2.5" fill="#E8B23A"/>
  <circle cx="642" cy="186" r="15" fill="#E8B23A"/><text x="642" y="191" text-anchor="middle" fill="#16100A" font-size="15" font-weight="800">4</text>
  <text x="668" y="191" fill="#F0E5CB" font-size="19" font-weight="700">Governance — the maintainer contract</text>
  <g>
    <rect x="634" y="212" width="262" height="68" rx="10" fill="#0d0a05" stroke="#7a6228" stroke-width="1.2"/>
    <text x="650" y="236" fill="#E8B23A" font-size="14.5" font-weight="700">CLAUDE.md schema</text>
    <text x="650" y="257" fill="#cdbd97" font-size="12.5">provenance · preserve-conflict</text>
    <text x="650" y="273" fill="#cdbd97" font-size="12.5">current-vs-superseded · no auto-resolve</text>
  </g>
  <line x1="896" y1="246" x2="930" y2="246" stroke="#E8B23A" stroke-width="2" marker-end="url(#aGold)"/>
  <g>
    <rect x="930" y="212" width="262" height="68" rx="10" fill="#0d0a05" stroke="#7a6228" stroke-width="1.2"/>
    <text x="946" y="236" fill="#E8B23A" font-size="14.5" font-weight="700">wiki-maintainer skill</text>
    <text x="946" y="257" fill="#cdbd97" font-size="12.5">loaded as the recall</text>
    <text x="946" y="273" fill="#cdbd97" font-size="12.5">system_prompt</text>
  </g>

  <!-- ============================================================ -->
  <!-- MAIN PIPELINE ROW                                            -->
  <!-- ============================================================ -->

  <!-- (1) SOURCES -->
  <g filter="url(#shadow)">
    <rect x="50" y="400" width="250" height="320" rx="16" fill="url(#gSrc)" stroke="#5B7A88" stroke-width="1.4"/>
  </g>
  <rect x="50" y="400" width="250" height="5" rx="2.5" fill="#7FA8B8"/>
  <circle cx="82" cy="436" r="15" fill="#7FA8B8"/><text x="82" y="441" text-anchor="middle" fill="#0A1416" font-size="15" font-weight="800">1</text>
  <text x="108" y="435" fill="#DCE7E4" font-size="18" font-weight="700">Sources</text>
  <text x="108" y="454" fill="#8FA6A0" font-size="12.5">42 docs · multi-format</text>
  <g font-size="12.5" fill="#cfe0dc">
    <rect x="70" y="476" width="210" height="44" rx="8" fill="#0e171b" stroke="#3c5560"/>
    <text x="84" y="495" font-weight="700" fill="#aecbd6">Product &amp; Eng</text>
    <text x="84" y="512">PRD · ADRs · Roadmap · Decisions</text>
    <rect x="70" y="528" width="210" height="44" rx="8" fill="#0e171b" stroke="#3c5560"/>
    <text x="84" y="547" font-weight="700" fill="#aecbd6">GTM &amp; Ops</text>
    <text x="84" y="564">OKRs · Sales · GTM · Design · RACI</text>
    <rect x="70" y="580" width="210" height="44" rx="8" fill="#0e171b" stroke="#3c5560"/>
    <text x="84" y="599" font-weight="700" fill="#aecbd6">Operational hay (30)</text>
    <text x="84" y="616">Standups · Retros · QA · Support</text>
    <rect x="70" y="632" width="210" height="44" rx="8" fill="#0e171b" stroke="#3c5560"/>
    <text x="84" y="651" font-weight="700" fill="#aecbd6">Multi-format</text>
    <text x="84" y="668">.txt transcript · .json Slack · .csv</text>
  </g>

  <!-- arrow 1->2 -->
  <line x1="300" y1="560" x2="338" y2="560" stroke="#6f8a86" stroke-width="2.4" marker-end="url(#aMute)"/>

